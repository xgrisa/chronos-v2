services:

  postgres:
    image: postgres:16-alpine
    container_name: chronos-postgres
    environment:
      POSTGRES_DB: chronos
      POSTGRES_USER: chronos
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - chronos-internal
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: chronos-backend
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: chronos
      PGUSER: chronos
      PGPASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
    depends_on:
      - postgres
    networks:
      - chronos-internal
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: chronos-frontend
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - chronos-internal
      - proxy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.chronos.rule=Host(`chronos.xgsdev.com`)"
      - "traefik.http.routers.chronos.entrypoints=websecure"
      - "traefik.http.routers.chronos.tls.certresolver=myresolver"
      - "traefik.http.services.chronos.loadbalancer.server.port=80"

volumes:
  postgres_data:

networks:
  chronos-internal:
    driver: bridge
  proxy:
    external: true
