server {
    listen 80;

    # ── Frontend ────────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # try_files es clave para el router de Angular:
        # si la ruta no corresponde a un fichero real (ej: /dashboard),
        # devuelve index.html y Angular gestiona la navegación en el cliente
        try_files $uri $uri/ /index.html;
    }

    # ── API ─────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
